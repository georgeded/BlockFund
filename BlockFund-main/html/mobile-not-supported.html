<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Not Supported</title>
    <link rel="icon" href="../images/blockfund_logo.png" type="image/png" style="width: 16px; height: 16px;">
    <script>
        function checkIfLargerThan768() {
            if (window.innerWidth > 768) {
                const previousUrl = localStorage.getItem('previousUrl') || '../html/index.html';
                window.location.href = previousUrl;
                localStorage.removeItem('previousUrl'); // Clear previousUrl after redirection
            }
        }

        // Run the function continuously on window resize
        window.addEventListener('resize', () => {
            checkIfLargerThan768();
        });

        // Run the function once on page load
        window.addEventListener('load', () => {
            checkIfLargerThan768();
        });
    </script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            color: #333;
            background-image: url('../images/block_center_space.png');
            background-size: cover;
        }
        .container {
            max-width: 500px;
            padding: 20px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="../images/blockfund_logo.png" alt="Blockfund Logo" style="width: 10vw;">
        <h1>Mobile Device Not Supported</h1>
        <p>We are sorry, but this site is not yet available for mobile devices. Please access it from a desktop or laptop computer for the best experience.</p>
    </div>
</body>
</html>
