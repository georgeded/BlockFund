<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="dark light">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../css/register.css">
    <script src="../javascript/register.js" defer></script>
    <script src="../javascript/main.js" defer></script>
    <title>BlockFund.org</title>
    <link rel="icon" href="../images/blockfund_logo.png" type="image/png" style="width: 16px; height: 16px;">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapperSuccess">
        <div class="success">
            <h1>Registration successful!</h1>
            <p>Returning to home page</p>
        </div>
    </div>
    <div class="wrapper">
        <form id="registerForm" action="#">
            <h2>Register</h2>
            <div id="publicKey">
                <input type="text" required id="publicKeyInput">
                <label>Enter your public key</label>
            </div>
            <div id="password">
                <input type="password" required id="passwordInput">
                <label>Enter your password</label>
            </div>
            <div class="home">
                <a href="../html/"><i class="fas fa-home"></i> Home page</a>
            </div>
            <button type="submit">Register</button>
        </form>
    </div>
</body>
</html>
